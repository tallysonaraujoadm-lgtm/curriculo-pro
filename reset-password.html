<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Redefinir senha | Currículo Pro</title>
    <link rel="stylesheet" href="/styles.css">
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  </head>
  <body class="standalone-auth-page">
    <main class="auth-modal standalone-auth-card">
      <p class="eyebrow">Currículo Pro</p>
      <h1>Criar nova senha</h1>
      <p>Informe uma senha com pelo menos 8 caracteres.</p>
      <form class="auth-form" id="resetPasswordForm">
        <label>
          Nova senha
          <input id="newPassword" type="password" minlength="8" autocomplete="new-password" required>
        </label>
        <label>
          Confirmar senha
          <input id="confirmPassword" type="password" minlength="8" autocomplete="new-password" required>
        </label>
        <button class="primary-button auth-submit" type="submit">Salvar nova senha</button>
      </form>
      <p class="auth-status" id="resetStatus" aria-live="polite"></p>
      <p><a href="/">Voltar ao site</a></p>
    </main>
    <script type="module" src="/reset-password.js"></script>
  </body>
</html>
